<!doctype html>
<html lang="uk">
<head>
  <title>Завдання 5 — colgroup</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }

    table {
      border-collapse: collapse;
      border: 3px double #4a7c59;
      box-shadow: 4px 4px 0px #4a7c59;
    }

    th {
      border: 2px solid #2c5f2e;
      padding: 8px 16px;
      font-size: 14px;
    }

    td {
      border-top: 1px solid #aaa;
      border-bottom: 1px solid #aaa;
      border-left: 2px dashed #888;
      border-right: 2px dashed #888;
      padding: 7px 16px;
      font-size: 14px;
    }

    tr:first-child th { border-bottom: 3px solid #2c5f2e; }
  </style>
</head>
<body>
  <table>
    <colgroup>
      <col span="2" style="background: khaki">
      <!-- З допомогою цієї конструкції задаємо колір фону для перших двох стовпців таблиці -->
      <col style="background-color: LightCyan"><!-- Задаємо колір фону для наступного (одного) стовпця таблиці -->
    </colgroup>
    <tr>
      <th>№ з/п</th>
      <th>Найменування</th>
      <th>Ціна, грн</th>
    </tr>
    <tr>
      <td>1</td>
      <td>Олівець кольоровий</td>
      <td>20,00</td>
    </tr>
    <tr>
      <td>2</td>
      <td>Лінійка 20 см</td>
      <td>30,00</td>
    </tr>
  </table>
</body>
</html>
