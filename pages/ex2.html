<HTML>
<HEAD>
  <TITLE>Пробна таблиця</TITLE>
</HEAD>

      <TD>10</TD>
      <TD ROWSPAN="2">20</TD>

      <TD>40</TD>
    </TR>
    <TR>
      <TD>100</TD>
      <TD>300</TD>
      <TD>400</TD>
    </TR>
  </TABLE>
</BODY>
</HTML>
