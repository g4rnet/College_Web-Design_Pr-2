<!DOCTYPE HTML>
<html>
<head>
  <meta charset="utf-8">
  <title>Кольори в таблиці</title>
  <style type="text/css">
    body {
      font-size: 1.5em; /* Розмір тексту */
    }
    table {
      width: 100%; /* Ширина таблиці */
    }
    td { padding: 5px; }
    td.col1 { background: red;    color: white; }
    td.col2 { background: orange; color: gray;  }
    td.col3 { background: yellow; }
  </style>
</head>
<body>
  <table cellspacing="0">
    <tr>
      <td class="col1">Крок 1</td>
      <td class="col2">Крок 2</td>
      <td class="col3">Крок 3</td>
    </tr>
  </table>
</body>
</html>
